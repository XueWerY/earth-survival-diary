  - id: mnd0xscoa5f1tf
    category_id: mnd0xortkg679q
    title: 《遗传算法-理论、应用与软件实现》
    content: >
      ### 2.5 算法设计与实现


      基本遗传算法（Simple Genetic Algorithm，SGA）可定义为一个 8 元组：


      $$

      SGA = (С, E, Р_0, M,Ф, Г,Ψ, Т) \tag{2.5.1}

      $$


      式中各符号含义如下：


      * $C$ —— 个体的编码方法，SGA 使用固定长度二进制符号串的编码方法

      * $E$ —— 个体的适应度评价函数

      * $ P_0$ —— 初始群体

      * $M$ —— 群体大小，一般取 20\~100

      * $Ф$ —— 选择算子，SGA 使用比例选择算子

      * $L$ —— 交叉算子，SGA 使用单点交叉算子

      * $Ψ$ —— 变异算子，SGA 使用基本位变异算子

      * $T$ —— 算法终止条件，一般终止进化代数为 100\~500


      #### 2.5.1 问题的表示


      对于一个实际的待优化问题，首先需要将其表示为适合于遗传算法操作的形式。这里以二进制编码为例进行说明。


      **二进制编码的基本步骤**


      二进制编码将实际优化问题的参数转换为遗传算法可操作的二进制字符串，具体包括以下三个步骤：


      1. **确定待寻优参数**：根据具体问题明确需要优化的所有参数。

      2. 对每个参数确定它的变化范围，并用一个二进制数来表示。若参数 **a** 的变化范围为 $[a_{min},a_{max}]$，用 **m**
      位二进制数 **b** 来表示，则二者之间满足线性映射关系：

         $$
         a = a_{\text{min}} + \frac{b}{2^m - 1}(a_{\text{max}} - a_{\text{min}}) \tag{2.5.2}
         $$

         此时参数范围的确定应覆盖全部的寻优空间，字长 **m** 的确定应在满足精度要求情况下尽量取小值，以减小遗传算法计算的复杂性。
      3. **多参数串接**：将所有表示参数的二进制数串接起来组成一个长的二进制字串。该字串的每一位只有 0 或 1 两种取值，即为遗传算法的操作对象。


      **二进制 - 实参数线性映射公式 (2.5.2) 详解**


      公式 (2.5.2) 实现了**二进制数到实际参数值的线性映射**，将遗传算法中的二进制字符串（基因型）对应到实际优化问题中的连续参数（表现型）。


      1. **公式设计的核心考虑**

         **建立端点对应关系**：

         假设用一个 $m$ 位的二进制数 $b$（$b$ 是从 0 到 $ 2^m−1$ 的整数）来表示参数 $a$，则：

         当 $b=0$ 时，$a=a_{min}$

         当 $b=2^m−1$ 时，$a=a_{max}$

         当 $b$ 取中间值时，$a$ 按比例落在 $[a_{min},a_{max}]$ 之间

         **线性插值原理：**

         公式本质是一个线性插值过程：

         $$
         a = a_{\text{min}} + \frac{b}{2^m - 1} (a_{\text{max}} - a_{\text{min}})
         $$

         其中系数 $\frac{b}{2^m - 1}$ 将 $b$ 从整数范围 $[0, 2^m-1]$ 映射到实数范围 $[0, 1]$，再乘以区间长度 $(a_{\text{max}} - a_{\text{min}})$，加上起点 $a_{\text{min}}$，得到实际参数值。

         **均匀分割搜索空间：**

         这种方式将区间 $[a_{\text{min}}, a_{\text{max}}]$ 均匀地分成了 $ 2^m - 1$ 个小段。每个二进制数对应一个离散的、均匀分布的参数值，保证了搜索的均匀性。

         **便于遗传操作：**

         该公式提供了一种标准的方法将二进制串解码为实际问题的解，从而能够计算适应度，支持后续的选择、交叉、变异等遗传操作。
      2. **简单举例**

         假设 $a_{\text{min}} = 0$，$a_{\text{max}} = 100$，用 $m = 3$ 位二进制（取值范围 0~7）：

         $b = 0$（二进制 000）→ $a = 0$

         $b = 7$（二进制 111）→ $a = 100$

         $b = 4$（二进制 100）→ $a = 0 + \frac{4}{7} \times 100 \approx 57.14$

         这样，任意一个 3 位二进制串都能解码为一个在 $[0,100]$ 内的具体数值，且覆盖了整个区间。
      3. **分母为 $ 2^m−1$ 的原因**

         在二进制编码中，一个 $m$ 位的二进制数 $b$ 的每一位只能是 0 或 1，因此它能表示的所有可能取值正好是 $ 2^m$ 个不同的组合。这些组合按二进制数值从小到大排列，对应的整数范围就是 $ 0,1,2,…,2^m−1$。所以 $b$ 是取自区间 $[0,2^m−1]$ 的整数。公式 (2.5.2) 中分母为 $ 2^m−1 $，正是为了将这个整数范围归一化到 $[0,1]$ 区间，再线性映射到实际的参数范围 $[a_{min},a_{max}]$。

      **多参数二进制串接的必要性**


      将所有表示参数的二进制数串接成一个长的二进制字符串，是遗传算法实现中的关键设计，主要有以下四个原因：


      1. **将多参数问题统一为单一染色体**
         实际优化问题通常包含多个参数（如 $a_1,a_2,...,a_n$）。遗传算法的操作对象是**染色体**（即一个完整的个体）。串接后，每个个体用一个二进制串表示，包含了所有参数的信息，使多参数问题在形式上与单参数问题统一起来。
      2. **支持遗传算子的统一操作**

         遗传算法的核心是**交叉**和**变异**等算子，它们需要在一个**完整的染色体**上进行操作：

         **交叉**：在两个父代个体的二进制串上选取一个或多个交叉点，交换部分片段。串接后的长串允许交叉发生在任意位置，从而可能产生参数之间新的组合。

         **变异**：对串中的某一位进行翻转（0 变 1，1 变 0）。串接后，所有参数的编码位都平等地接受变异，无需为每个参数单独设计变异操作。
      3. **保证个体的完整性与遗传的统一性**

         在遗传算法中，一个个体对应一个完整的解。串接使得每个解都由一个统一的二进制串表示，便于种群管理、适应度评价、选择、复制等操作。如果不串接而分别处理每个参数，算法流程会变得复杂，且难以保证各个参数之间的协同进化。
      4. **便于编码与解码**

         串接后的长串仍然可以用公式 (2.5.2) 的思想进行分段解码：事先约定好每个参数占用的位数和顺序，解码时按段截取，分别转换成对应的参数值。这种设计清晰、实现简单。
      5. 多参数串接举例


      假设一个优化问题有 2 个参数：


      - 参数 $x$ 用 4 位二进制表示

      - 参数 $y$ 用 3 位二进制表示


      串接后的染色体是一个 7 位的二进制串，例如：`1011 010`。


      - 前 4 位 `1011` 解码为 $x$

      - 后 3 位 `010` 解码为 $y$


      在交叉时，可能在第 5 位处切割，从而将父代 1 的 $x$ 部分与父代 2 的 $y$
      部分组合起来，生成新个体。如果不串接，就很难实现这种跨参数的组合。
