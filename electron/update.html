<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>更新</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
      -webkit-app-region: drag;
    }
    .container {
      text-align: center;
      padding: 32px;
      max-width: 360px;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    .status { font-size: 15px; margin-bottom: 16px; line-height: 1.6; color: rgba(255,255,255,0.85); }
    .version { font-size: 13px; color: rgba(100,200,255,0.85); margin-bottom: 4px; }
    .download-btn {
      margin: 12px 0 16px;
      padding: 8px 24px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    .download-btn:hover { opacity: 0.9; }
    .error { color: rgba(255,100,100,0.9); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🌍</div>
    <div class="status" id="status">正在检查更新...</div>
    <div id="infoArea" class="hidden">
      <div class="version" id="versionText"></div>
      <button class="download-btn" id="downloadBtn" onclick="openDownload()">前往 GitHub Releases 下载</button>
    </div>
  </div>
  <script>
    var st = document.getElementById('status')
    var infoArea = document.getElementById('infoArea')
    var versionText = document.getElementById('versionText')
    var downloadBtn = document.getElementById('downloadBtn')

    var RELEASES_URL = 'https://github.com/XueWerY/earth-survival-diary/releases'

    window.electronAPI.onUpdateStatus(function (data) {
      if (data.status === 'available') {
        st.textContent = '发现新版本，请前往下载'
        versionText.textContent = data.version ? 'v' + data.version : ''
        infoArea.classList.remove('hidden')
      } else if (data.status === 'error') {
        st.textContent = '更新检查失败'
        st.classList.add('error')
        versionText.textContent = data.message || ''
        infoArea.classList.remove('hidden')
        downloadBtn.style.display = 'none'
      } else if (data.status === 'no-update') {
        st.textContent = '已是最新版本'
        setTimeout(function () { window.close() }, 1500)
      }
    })

    function openDownload() {
      window.electronAPI.openExternal(RELEASES_URL)
    }
  </script>
</body>
</html>
